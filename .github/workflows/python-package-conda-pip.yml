name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install panoptes + plugin + Snakemake 9
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install 'snakemake>=9'
          pip install snakemake-logger-plugin-panoptes

      - name: Run test suite (unit + internal e2e)
        run: |
          pytest panoptes/tests -v

  example-workflow:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge,bioconda
          channel-priority: strict
          python-version: '3.11'

      - name: Install Snakemake 9 + plugin from PyPI
        # We keep miniconda set up so snakemake's --use-conda can build the
        # per-rule envs, but install snakemake and the logger plugin via pip
        # to avoid bioconda channel-solver conflicts.
        run: |
          pip install 'snakemake>=9' snakemake-logger-plugin-panoptes

      - name: Install panoptes from source
        run: pip install .

      - name: Start panoptes server
        run: |
          panoptes --ip 127.0.0.1 --port 5000 > panoptes.log 2>&1 &
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:5000/api/service-info && break
            sleep 0.5
          done

      - name: Clone the example workflow
        # TODO: point at master once the Snakemake-9 migration PR is merged
        # (panoptes-organization/snakemake_example_workflow#snakemake-9-logger-plugin).
        run: |
          git clone --branch snakemake-9-logger-plugin --depth 1 \
            https://github.com/panoptes-organization/snakemake_example_workflow.git \
            ../snakemake_example_workflow

      - name: Run example workflow with --logger panoptes
        working-directory: ../snakemake_example_workflow
        run: bash run_local.sh

      - name: Verify panoptes captured the run
        run: |
          curl -sS http://127.0.0.1:5000/api/workflows | tee workflows.json
          python -c "
          import json
          data = json.load(open('workflows.json'))
          assert data['count'] == 1, data
          wf = data['workflows'][0]
          assert wf['status'] == 'Done', wf
          assert wf['jobs_done'] == wf['jobs_total'] > 0, wf
          print('panoptes recorded workflow OK')
          "

      - name: Upload panoptes log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: panoptes-log
          path: panoptes.log
