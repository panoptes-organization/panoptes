name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: setup.py

      - name: Install panoptes + plugin + Snakemake 9
        run: |
          python -m pip install --upgrade pip
          pip install '.[dev]'
          pip install 'snakemake>=9'
          pip install snakemake-logger-plugin-panoptes

      - name: Run test suite (unit + internal e2e)
        run: |
          pytest panoptes/tests -v

  # The same suite against PostgreSQL instead of SQLite, so the documented
  # PANOPTES_DB_URL=postgresql://... support can't silently regress (#203).
  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: panoptes
          POSTGRES_PASSWORD: panoptes
          POSTGRES_DB: panoptes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U panoptes"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: setup.py

      - name: Install panoptes with the postgres extra
        run: |
          python -m pip install --upgrade pip
          pip install '.[dev,postgres]'
          pip install 'snakemake>=9'
          pip install snakemake-logger-plugin-panoptes

      - name: Run test suite against PostgreSQL
        env:
          PANOPTES_TEST_DB_URL: postgresql+psycopg2://panoptes:panoptes@127.0.0.1:5432/panoptes_test
        run: |
          pytest panoptes/tests -v

  # Runs in parallel with the unit-test matrix (no `needs:`), so the slowest
  # job sets the wall time instead of the two adding up (#135).
  example-workflow:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Clone the example workflow
        # Cloned inside the workspace so hashFiles() below can key the cache
        # on the per-rule conda env definitions.
        run: |
          git clone --depth 1 \
            https://github.com/panoptes-organization/snakemake_example_workflow.git \
            example_workflow

      - name: Cache the per-rule conda envs
        # Building the rule envs (samtools, htseq, coreutils) is what actually
        # costs time in this job (#135); reuse them until envs/*.yaml change.
        uses: actions/cache@v4
        with:
          path: example_workflow/.snakemake/conda
          key: snakemake-conda-envs-${{ runner.os }}-${{ hashFiles('example_workflow/envs/*.yaml') }}

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          channels: conda-forge,bioconda
          channel-priority: strict
          python-version: '3.11'

      - name: Install Snakemake 9 + plugin from PyPI
        # Miniconda stays available so snakemake's --use-conda can build the
        # per-rule envs, but install snakemake and the plugin via pip so the
        # test never waits on the bioconda channel catching up to a release.
        run: |
          pip install 'snakemake>=9' snakemake-logger-plugin-panoptes

      - name: Install panoptes from source
        run: pip install .

      - name: Start panoptes server
        run: |
          panoptes --ip 127.0.0.1 --port 5000 > panoptes.log 2>&1 &
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:5000/api/service-info && break
            sleep 0.5
          done

      - name: Run example workflow with --logger panoptes
        working-directory: example_workflow
        run: bash run_local.sh

      - name: Verify panoptes captured the run
        run: |
          curl -sS http://127.0.0.1:5000/api/workflows | tee workflows.json
          python -c "
          import json
          data = json.load(open('workflows.json'))
          assert data['count'] == 1, data
          wf = data['workflows'][0]
          assert wf['status'] == 'Done', wf
          assert wf['jobs_done'] == wf['jobs_total'] > 0, wf
          print('panoptes recorded workflow OK')
          "

      - name: Upload panoptes log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: panoptes-log
          path: panoptes.log
